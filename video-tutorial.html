<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial - Master Condos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(180deg, #190404 0%, #1e060c 100%);
            font-family: 'Outfit', 'Inter', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .video-container {
            width: 100%;
            max-width: 900px;
            background: linear-gradient(135deg, rgba(55,15,15,0.9) 0%, rgba(42,10,10,0.9) 100%);
            border: 1px solid rgba(246,59,59,0.12);
            border-radius: 1.25rem;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
        }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
        }
        
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .title {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .title h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }
        
        .title p {
            color: rgba(250, 96, 96, 1);
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div style="width: 100%; max-width: 900px;">
        <div class="title">
            <h1>📺 Tutorial Master Condos</h1>
            <p>Aprenda como usar o Master Condos</p>
        </div>
        
        <div class="video-container">
            <div class="video-wrapper">
                <video controls>
                    <source src="/assets/tutorial.mp4" type="video/mp4">
                    Seu navegador não suporta vídeo HTML5.
                </video>
            </div>
        </div>
    </div>
</body>
</html>
